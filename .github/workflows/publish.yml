name: Publish to GitHub Packages

on:
  push:
    branches: [main]
    paths:
      - "packages/react-doctor/**"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://npm.pkg.github.com"
          scope: "@proda-ai"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Check version is not already published
        working-directory: packages/react-doctor
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          if npm view "@proda-ai/react-doctor@$VERSION" version --registry=https://npm.pkg.github.com 2>/dev/null; then
            echo "❌ Version $VERSION is already published. Bump the version in package.json before merging."
            exit 1
          fi
          echo "✅ Version $VERSION is not yet published"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        working-directory: packages/react-doctor
        run: pnpm build

      - name: Publish
        working-directory: packages/react-doctor
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Publish to GitHub Packages

on:
  push:
    branches: [main]
    paths:
      - "packages/react-doctor/**"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://npm.pkg.github.com"
          scope: "@proda-ai"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Bump version
        working-directory: packages/react-doctor
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          # Extract proda suffix number, increment it
          if [[ "$CURRENT" =~ -proda\.([0-9]+)$ ]]; then
            BASE="${CURRENT%-proda.*}"
            NUM="${BASH_REMATCH[1]}"
            NEXT="$BASE-proda.$((NUM + 1))"
          else
            NEXT="$CURRENT-proda.1"
          fi
          npm version "$NEXT" --no-git-tag-version
          echo "VERSION=$NEXT" >> "$GITHUB_ENV"
          echo "📦 Version: $NEXT"

      - name: Build
        working-directory: packages/react-doctor
        run: pnpm build

      - name: Publish
        working-directory: packages/react-doctor
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/react-doctor/package.json
          git commit -m "📦 Release @proda-ai/react-doctor@${{ env.VERSION }} [skip ci]"
          git push
